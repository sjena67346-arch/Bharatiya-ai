<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bharatiya AI</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🪔</span>
        <span class="logo-text">Bharatiya AI</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
    </div>
    <div class="sidebar-history" id="chatHistory">
      <p class="history-label">Recent</p>
      <!-- Dynamic history items -->
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">🇮🇳</div>
        <span>Bharatiya User</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="model-badge">Bharatiya AI · Powered by Claude</div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Clear chat" id="clearBtn">🗑️</button>
      </div>
    </header>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">

      <!-- Welcome Screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-diya">🪔</div>
        <h1 class="welcome-title">नमस्ते! I'm <span>Bharatiya AI</span></h1>
        <p class="welcome-sub">Your intelligent Indian AI assistant. Ask me anything, share an image, or let me create one for you.</p>
        <div class="suggestion-grid">
          <button class="suggestion-card" data-prompt="Tell me about India's space missions and ISRO's achievements">🚀 India's Space Missions</button>
          <button class="suggestion-card" data-prompt="Explain the significance of the Indian Constitution">📜 Indian Constitution</button>
          <button class="suggestion-card" data-prompt="Generate an image of the Taj Mahal at sunrise">🎨 Generate Taj Mahal Image</button>
          <button class="suggestion-card" data-prompt="What are the major festivals celebrated in India?">🎉 Indian Festivals</button>
          <button class="suggestion-card" data-prompt="Explain how AI is transforming India's economy">🤖 AI in India</button>
          <button class="suggestion-card" data-prompt="Write a short poem in Hindi about nature">✍️ Hindi Poem</button>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages"></div>

    </div>

    <!-- Input Area -->
    <div class="input-area">
      <!-- Image preview -->
      <div class="image-preview-wrap" id="imagePreviewWrap" style="display:none;">
        <img id="imagePreview" src="" alt="preview" />
        <button class="remove-img" id="removeImg">✕</button>
      </div>

      <div class="input-row">
        <label class="attach-btn" title="Attach image">
          📎
          <input type="file" id="imageInput" accept="image/*" style="display:none;" />
        </label>
        <textarea
          id="userInput"
          placeholder="Ask Bharatiya AI anything…"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="disclaimer">Bharatiya AI can make mistakes. Verify important information.</p>
    </div>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" style="display:none;">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose">✕</button>
      <img id="lightboxImg" src="" alt="full" />
    </div>
  </div>

  <script src="app.js"></script>
</body>
  </html>
